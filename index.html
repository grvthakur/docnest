<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>DocNest</title>
    <script>
        (function () {
            var saved = localStorage.getItem("docnest_theme");
            var theme =
                saved ||
                (window.matchMedia("(prefers-color-scheme: dark)").matches
                    ? "dark"
                    : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4">
</head>

<body>
    <div id="app">
        <div style="padding:2rem;text-align:center;color:#64748b;font-family:sans-serif;">
            Loading DocNest...
        </div>
    </div>
    <script type="module" src="js/main.js?v=4"></script>
</body>

</html>
